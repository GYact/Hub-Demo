name: Supabase Database Backup

on:
  schedule:
    # 毎日AM3時(JST) = 18:00 UTC
    - cron: '0 18 * * *'
  workflow_dispatch:
    # 手動実行も可能

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL 17 client
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Set timezone
        run: echo "BACKUP_DATE=$(TZ=Asia/Tokyo date +%Y%m%d_%H%M%S)" >> $GITHUB_ENV

      - name: Create backup
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          /usr/lib/postgresql/17/bin/pg_dump \
            "${{ secrets.SUPABASE_DB_URL }}" \
            -F c \
            -f "backup_${{ env.BACKUP_DATE }}.dump"

          echo "Backup created: backup_${{ env.BACKUP_DATE }}.dump"
          ls -lh *.dump

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ env.BACKUP_DATE }}
          path: "*.dump"
          retention-days: 30
          compression-level: 9

      - name: Backup summary
        run: |
          echo "## Backup Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Date**: ${{ env.BACKUP_DATE }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Retention**: 30 days" >> $GITHUB_STEP_SUMMARY
          echo "- **Size**: $(ls -lh *.dump | awk '{print $5}')" >> $GITHUB_STEP_SUMMARY
