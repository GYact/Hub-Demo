name: HubHealth
options:
  bundleIdPrefix: com.gyact.hub
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: YES

targets:
  HubHealth:
    type: application
    platform: iOS
    sources:
      - path: HubHealth
      - path: Shared
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: BUA8FAMN7K
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_SUPABASE_URL: https://pjhtnuifazdoomyvlwwd.supabase.co
        INFOPLIST_KEY_NSHealthShareUsageDescription: "Hubはヘルスケアデータ（心拍数、歩数、睡眠等）をダッシュボードに同期するためにHealthKitにアクセスします。"
        INFOPLIST_KEY_UIBackgroundModes: "[fetch]"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "[UIInterfaceOrientationPortrait]"
    entitlements:
      path: HubHealth/HubHealth.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.background-delivery: true

  HubHealthWatch:
    type: application
    platform: watchOS
    bundleIdPrefix: ""
    sources:
      - path: HubHealthWatch
      - path: Shared
    dependencies:
      - target: HubHealthWatchWidgets
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: BUA8FAMN7K
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.gyact.hub.HubHealth.watchkitapp
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.gyact.hub.HubHealth
        INFOPLIST_KEY_SUPABASE_URL: https://pjhtnuifazdoomyvlwwd.supabase.co
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: HubHealthWatch/HubHealthWatch.entitlements

  HubHealthWatchWidgets:
    type: app-extension
    platform: watchOS
    bundleIdPrefix: ""
    sources:
      - path: HubHealthWatchWidgets
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        DEVELOPMENT_TEAM: BUA8FAMN7K
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.gyact.hub.HubHealth.watchkitapp.widgets
        INFOPLIST_FILE: HubHealthWatchWidgets/Info.plist
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
