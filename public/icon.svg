<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#334155"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#0284c7"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Network icon -->
  <g transform="translate(256, 256)">
    <!-- Center node -->
    <circle cx="0" cy="0" r="40" fill="url(#accent)"/>
    <!-- Top node -->
    <circle cx="0" cy="-120" r="30" fill="#f1f5f9"/>
    <line x1="0" y1="-40" x2="0" y2="-90" stroke="#f1f5f9" stroke-width="8" stroke-linecap="round"/>
    <!-- Bottom left node -->
    <circle cx="-100" cy="80" r="30" fill="#f1f5f9"/>
    <line x1="-30" y1="25" x2="-70" y2="55" stroke="#f1f5f9" stroke-width="8" stroke-linecap="round"/>
    <!-- Bottom right node -->
    <circle cx="100" cy="80" r="30" fill="#f1f5f9"/>
    <line x1="30" y1="25" x2="70" y2="55" stroke="#f1f5f9" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>






